name: Security Scan

on:
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday at midnight
  workflow_dispatch:

jobs:
  # ===========================================================================
  # RUST SECURITY AUDIT
  # ===========================================================================

  cargo-audit:
    name: Cargo Audit (Rust)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo audit
        run: cargo audit
        continue-on-error: true

      - name: Generate audit report
        run: cargo audit --json > audit-report.json || true

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: cargo-audit-report
          path: audit-report.json
          retention-days: 30

  # ===========================================================================
  # NODEJS/TYPESCRIPT SECURITY AUDIT
  # ===========================================================================

  npm-audit:
    name: NPM Audit (TypeScript SDK)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd sdk/ts-sdk
          npm ci

      - name: Run npm audit
        run: |
          cd sdk/ts-sdk
          npm audit --audit-level=moderate || true

      - name: Generate npm audit report
        run: |
          cd sdk/ts-sdk
          npm audit --json > ../../npm-audit-report.json || true

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: npm-audit-report.json
          retention-days: 30

  # ===========================================================================
  # DOTNET SECURITY CHECK
  # ===========================================================================

  dotnet-audit:
    name: .NET Vulnerable Packages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Restore dependencies
        run: |
          cd sdk/dotnet-sdk
          dotnet restore

      - name: Check for vulnerable packages
        run: |
          cd sdk/dotnet-sdk
          dotnet list package --vulnerable || true

      - name: Run dotnet security checks
        run: |
          cd sdk/dotnet-sdk
          dotnet build --configuration Release --no-restore 2>&1 | grep -i "warning.*security" || echo "No security warnings found"
        continue-on-error: true

      - name: Upload dotnet report
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-security-report
          path: sdk/dotnet-sdk/
          retention-days: 30

  # ===========================================================================
  # SECURITY SUMMARY
  # ===========================================================================

  security-summary:
    name: Security Scan Summary
    runs-on: ubuntu-latest
    needs: [cargo-audit, npm-audit, dotnet-audit]
    if: always()
    steps:
      - name: Check security scan results
        run: |
          echo "=== Security Scan Summary ==="
          echo "Cargo Audit: ${{ needs.cargo-audit.result }}"
          echo "NPM Audit: ${{ needs.npm-audit.result }}"
          echo ".NET Audit: ${{ needs.dotnet-audit.result }}"

          if [ "${{ needs.cargo-audit.result }}" = "failure" ] || \
             [ "${{ needs.npm-audit.result }}" = "failure" ] || \
             [ "${{ needs.dotnet-audit.result }}" = "failure" ]; then
            echo "Security scan detected issues"
            exit 1
          fi
          echo "All security scans passed"
